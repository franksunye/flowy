<!DOCTYPE html>
<html>
<head>
    <title>Console Test</title>
</head>
<body>
    <h1>Console Test - Check Browser Console</h1>
    <p>Open browser console (F12) to see the output</p>
    
    <script src="flowy.min.js"></script>
    <script>
        console.log('=== Flowy UMD Module Test ===');
        console.log('typeof window:', typeof window);
        console.log('typeof window.Flowy:', typeof window.Flowy);
        
        if (window.Flowy) {
            console.log('window.Flowy exists!');
            console.log('window.Flowy:', window.Flowy);
            
            if (typeof window.Flowy === 'object') {
                console.log('window.Flowy keys:', Object.keys(window.Flowy));
                
                Object.keys(window.Flowy).forEach(key => {
                    console.log(`window.Flowy.${key}:`, typeof window.Flowy[key], window.Flowy[key]);
                });
                
                // Test constructor
                if (window.Flowy.Flowy) {
                    console.log('Testing window.Flowy.Flowy constructor...');
                    try {
                        const canvas = document.createElement('div');
                        const instance = new window.Flowy.Flowy(canvas);
                        console.log('✅ SUCCESS: Flowy instance created!', instance);
                        console.log('Instance methods:', Object.getOwnPropertyNames(instance));
                    } catch (e) {
                        console.error('❌ Constructor failed:', e);
                    }
                }
                
                if (window.Flowy.default) {
                    console.log('Testing window.Flowy.default constructor...');
                    try {
                        const canvas = document.createElement('div');
                        const instance = new window.Flowy.default(canvas);
                        console.log('✅ SUCCESS: Flowy default instance created!', instance);
                    } catch (e) {
                        console.error('❌ Default constructor failed:', e);
                    }
                }
            }
        } else {
            console.error('❌ window.Flowy not found');
        }
        
        // Also check for global pollution
        console.log('Other globals:', Object.keys(window).filter(k => k.toLowerCase().includes('flowy')));
    </script>
</body>
</html>
